<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Wishes</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&amp;family=Caveat:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>
<body class="h-full">
  <div id="app-wrapper" class="w-full h-full overflow-auto relative" style="background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #fbcfe8 60%, #f9a8d4 100%);"><!-- Confetti container -->
  <div id="confetti-container" class="absolute inset-0 overflow-hidden pointer-events-none" style="z-index: 50;"></div><!-- Floating stars bg -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden" style="z-index:1;"><span style="position:absolute; top:8%; left:12%; font-size:20px; animation: twinkle 2.5s ease-in-out infinite;">⭐</span> <span style="position:absolute; top:15%; right:15%; font-size:16px; animation: twinkle 3s 0.5s ease-in-out infinite;">✨</span> <span style="position:absolute; top:40%; left:5%; font-size:14px; animation: twinkle 2s 1s ease-in-out infinite;">💫</span> <span style="position:absolute; top:60%; right:8%; font-size:18px; animation: twinkle 2.8s 0.3s ease-in-out infinite;">⭐</span> <span style="position:absolute; top:75%; left:18%; font-size:12px; animation: twinkle 3.2s 0.8s ease-in-out infinite;">✨</span> <span style="position:absolute; top:25%; left:80%; font-size:15px; animation: twinkle 2.3s 1.2s ease-in-out infinite;">💫</span>
  </div>
  <!-- Main content -->
  <div class="relative flex flex-col items-center justify-center min-h-full px-4 py-10" style="z-index:10;"><!-- Balloons -->
    <div class="absolute top-4 left-6 md:left-16 balloon-sway scale-in-d1">
    <svg width="50" height="70" viewbox="0 0 50 70"><ellipse cx="25" cy="25" rx="20" ry="25" fill="#ff6b9d" opacity="0.85" /> <ellipse cx="20" cy="18" rx="5" ry="7" fill="white" opacity="0.3" /> <line x1="25" y1="50" x2="25" y2="70" stroke="#d4628e" stroke-width="1.5" />
    </svg>
    </div>
    <div class="absolute top-8 right-8 md:right-20 balloon-sway-d1 scale-in-d2">
    <svg width="50" height="70" viewbox="0 0 50 70"><ellipse cx="25" cy="25" rx="20" ry="25" fill="#a78bfa" opacity="0.85" /> <ellipse cx="20" cy="18" rx="5" ry="7" fill="white" opacity="0.3" /> <line x1="25" y1="50" x2="25" y2="70" stroke="#8b6fdb" stroke-width="1.5" />
    </svg>
    </div>
    <div class="absolute top-16 left-1/4 balloon-sway-d2 scale-in-d3 hidden md:block">
    <svg width="44" height="64" viewbox="0 0 50 70"><ellipse cx="25" cy="25" rx="20" ry="25" fill="#34d399" opacity="0.8" /> <ellipse cx="20" cy="18" rx="5" ry="7" fill="white" opacity="0.3" /> <line x1="25" y1="50" x2="25" y2="70" stroke="#28a87a" stroke-width="1.5" />
    </svg>
    </div><!-- Party popper emojis -->
    <div class="slide-in-down text-center mt-4 mb-2"><span class="text-4xl md:text-5xl float-anim inline-block">🎊</span> <span class="text-3xl md:text-4xl float-anim-delay1 inline-block mx-2">🎈🎈🎈</span> <span class="text-4xl md:text-5xl float-anim-delay2 inline-block">🎊</span>
    </div><!-- Happy Birthday title -->
    <h1 id="main-title" class="slide-in-down text-center leading-tight mb-1 mt-5 pulse-glow" style="font-family: 'Caveat', cursive; font-size: 92px; font-weight: 900; color: #be185d; text-shadow: 2px 2px 0 rgba(255,255,255,0.6);">Happy Birthday!</h1><!-- Name -->
    <p id="birthday-name" class="scale-in-d1 text-center " style="font-family: 'Baloo 2', cursive; font-size: 42px; font-weight: 800; color: #9333ea;">Dear Crime Partner😉🫣</p>
    <!-- Cute Cake -->
    <div class="cake-bounce scale-in-d2 mb-6">
      <svg width="320" height="300" viewBox="0 0 160 150">
        <!-- Plate -->
        <ellipse cx="80" cy="138" rx="75" ry="10" fill="#8B008B" opacity="0.4" />
        <!-- Bottom layer -->
        <rect x="25" y="90" width="110" height="45" rx="12" fill="#f472b6" />
        <rect x="25" y="90" width="110" height="12" rx="6" fill="#fb7ebc" />
        <!-- Frosting drips -->
        <circle cx="78" cy="90" r="7" fill="#fbbf24" />
        <circle cx="98" cy="93" r="8" fill="#fbbf24" />
        <circle cx="118" cy="90" r="6" fill="#fbbf24" />
        <!-- Top layer -->
        <rect x="40" y="55" width="80" height="40" rx="10" fill="#a78bfa" />
        <rect x="40" y="55" width="80" height="10" rx="5" fill="#b99dfc" />
        <!-- Sprinkles -->
        <rect x="52" y="68" width="6" height="3" rx="1.5" fill="#34d399" transform="rotate(25 55 69)" />
        <rect x="90" y="66" width="6" height="3" rx="1.5" fill="#f472b6" transform="rotate(40 93 67)" />
        <rect x="105" y="74" width="6" height="3" rx="1.5" fill="#60a5fa" transform="rotate(-30 108 75)" />
        <!-- Candle -->
        <rect x="75" y="30" width="10" height="35" rx="3" fill="#fde68a" />
        <rect x="75" y="30" width="10" height="8" rx="3" fill="#fcd34d" />
        <!-- Flame -->
        <ellipse cx="80" cy="24" rx="7" ry="11" fill="#fb923c" class="candle-flicker" />
        <ellipse cx="80" cy="22" rx="4" ry="6" fill="#fbbf24" class="candle-flicker" />
        <ellipse cx="80" cy="21" rx="2" ry="3" fill="#fef3c7" />
        <!-- Cherries -->
        <circle cx="60" cy="55" r="6" fill="#ef4444" />
        <ellipse cx="58" cy="53" rx="2" ry="1.5" fill="white" opacity="0.4" />
        <path d="M 60 49 Q 62 40 68 38" stroke="#16a34a" stroke-width="1.5" fill="none" />
        <circle cx="100" cy="55" r="6" fill="#ef4444" />
        <ellipse cx="98" cy="53" rx="2" ry="1.5" fill="white" opacity="0.4" />
        <path d="M 100 49 Q 102 42 96 38" stroke="#16a34a" stroke-width="1.5" fill="none" />
      </svg>
    </div>
    
    <!-- Button to page 2 -->
  <a href="page2.html" class="px-6 py-3 mt-5 mb-6 bg-purple-500 text-white rounded hover:bg-purple-600">
    <b>See birthday note😁</b>
  </a>
    <!-- Footer -->
    <p id="footer-text" class="scale-in-d4 text-center" style="font-family: 'Caveat', cursive; font-size: 20px; color: #ec4899;">With love &amp; sprinkles 💝</p><!-- Hearts row -->
    <div class="mt-4 flex gap-3"><span class="float-anim text-2xl">💗</span> <span class="float-anim-delay1 text-2xl">🤍</span> <span class="float-anim-delay2 text-2xl">💗</span>
    </div>
  </div>
  </div>
    <script src="script.js"></script>
  </body>
</html>
